name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      # Linux: use tauri-action for bundling and release upload
      - name: Build Tauri app
        if: matrix.platform == 'ubuntu-22.04'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: "See the assets below to download the app."
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

      # Windows: build without bundling, upload portable exe
      - name: Build (Windows)
        if: matrix.platform == 'windows-latest'
        run: npx tauri build --target ${{ matrix.target }} --no-bundle

      - name: Upload portable exe (Windows)
        if: matrix.platform == 'windows-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view ${{ github.ref_name }} || \
            gh release create ${{ github.ref_name }} --title "${{ github.ref_name }}" --notes "See the assets below to download the app."
          cp src-tauri/target/${{ matrix.target }}/release/poe-chat-assistant.exe "PoE.Chat.Assistant_x64.exe"
          gh release upload ${{ github.ref_name }} "PoE.Chat.Assistant_x64.exe" --clobber
